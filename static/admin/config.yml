backend:
  name: github
  repo: RRROCA/rrroca-site
  branch: master
  base_url: https://sveltia-cms-auth.chad752.workers.dev

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: news
    label: News
    folder: content/news
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["news"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: events
    label: Events
    folder: content/events
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "Start Date & Time", name: date, widget: datetime }
      - { label: "End Date & Time", name: endDate, widget: datetime }
      - { label: Location, name: location, widget: string, hint: "Venue name (e.g., Royal Oak Community Park)" }
      - { label: Address, name: address, widget: string, hint: "Full address with postal code" }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["events"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: board-members
    label: Board Members
    folder: content/about/board-members
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Name, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, hint: "One-line role summary" }
      - { label: Categories, name: categories, widget: list, default: ["about"] }
      - { label: Tags, name: tags, widget: list, required: false, hint: "e.g., board, president, safety" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Bio, name: body, widget: markdown }

  - name: community
    label: Community
    folder: content/community
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["community"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: safety
    label: Safety
    folder: content/safety
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["safety"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: board-roster
    label: Board Roster Page
    files:
      - label: "Board of Directors"
        name: board-of-directors
        file: content/about/board-of-directors.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Date, name: date, widget: datetime }
          - { label: Description, name: description, widget: text }
          - { label: Draft, name: draft, widget: boolean, default: false }
          - { label: Body, name: body, widget: markdown }
