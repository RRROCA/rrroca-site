backend:
  name: github
  repo: CanChad/rrroca-site
  branch: master

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: news
    label: News
    folder: content/news
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["news"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: events
    label: Events
    folder: content/events
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["events"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Event Date, name: event_date, widget: datetime }
      - { label: Location, name: location, widget: string }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: board-members
    label: Board Members
    folder: content/about/board-members
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["about"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: community
    label: Community
    folder: content/community
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["community"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: safety
    label: Safety
    folder: content/safety
    create: true
    extension: md
    format: frontmatter
    frontmatter_delimiter: "---"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Categories, name: categories, widget: list, default: ["safety"] }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
