DirectoryPath: "public"
CheckExternal: false
CheckInternal: true
CheckMailto: false
CheckTel: false
CheckImages: true
IgnoreAltMissing: true      # TODO: add alt text to all images, then re-enable
IgnoreAltEmpty: true        # TODO: fix empty alt="" on decorative images
IgnoreURLs:
  - "https://fonts.googleapis.com"
  - "https://fonts.gstatic.com"
  - "http://localhost"
  - "^/rrroca-site/"          # Hugo baseURL path prefix — valid on deployed site
  - "^https://rrroca.github.io/rrroca-site/"
  - "^/\\.auth/"              # Azure SWA runtime auth routes (not static files)
IgnoreDirs:
  - "admin"
LogLevel: 1
