name: Test Coverage Tracker

on:
  push:
    branches: [master]

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    if: "!contains(github.event.head_commit.message, '[test-update]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Analyze changes and create test issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const files = commit.files.map(f => ({
              name: f.filename,
              status: f.status,
              additions: f.additions,
              deletions: f.deletions,
            }));

            const docsOnly = files.every(f =>
              f.name.startsWith('docs/') ||
              f.name.startsWith('.github/') ||
              f.name === 'README.md' ||
              f.name === 'package.json' ||
              f.name === 'package-lock.json'
            );
            if (docsOnly) {
              console.log('Docs/config only — no test issue needed');
              return;
            }

            const testMap = {
              'content/': [
                'content-validation.test.js',
                'build-validation.test.js',
                'navigation.test.js',
                'content-freshness.test.js',
                'seo.test.js',
                'feed.test.js',
                'accessibility.test.js',
              ],
              'themes/rrroca/layouts/': [
                'build-validation.test.js',
                'homepage-ux.test.js',
                'navigation.test.js',
                'accessibility.test.js',
                'seo.test.js',
                'security.test.js',
              ],
              'themes/rrroca/static/js/': [
                'ai-assistant.test.js',
                'search.test.js',
                'safety-dashboard.test.js',
                'safety-dashboard.partial.test.js',
                'forms.test.js',
                'inner-page.test.js',
                'directory-search.test.js',
              ],
              'themes/rrroca/static/css/': [
                'homepage-ux.test.js',
                'accessibility.test.js',
              ],
              'hugo.toml': [
                'build-validation.test.js',
                'navigation.test.js',
                'content-validation.test.js',
                'seo.test.js',
                'feed.test.js',
              ],
              'tests/': ['cross-platform.test.js'],
              'static/admin/': ['security.test.js'],
            };

            const affectedTests = new Set();
            const changesByArea = {};

            for (const file of files) {
              for (const [prefix, tests] of Object.entries(testMap)) {
                if (file.name.startsWith(prefix) || file.name === prefix) {
                  tests.forEach(t => affectedTests.add(t));
                  if (!changesByArea[prefix]) changesByArea[prefix] = [];
                  changesByArea[prefix].push(`- \`${file.name}\` (${file.status}: +${file.additions}/-${file.deletions})`);
                }
              }
            }

            if (Object.keys(changesByArea).length === 0) {
              console.log('No testable files changed — skipping');
              return;
            }

            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const shortSha = context.sha.substring(0, 7);
            const commitMsg = context.payload.head_commit.message.split('\n')[0];

            let body = `## Commit\n[\`${shortSha}\`](${commitUrl}) — ${commitMsg}\n\n`;
            body += '## Changed Files\n';
            for (const [area, changes] of Object.entries(changesByArea)) {
              body += `\n### \`${area}\`\n${changes.join('\n')}\n`;
            }

            body += '\n## Test Suites to Review\n';
            if (affectedTests.size > 0) {
              for (const test of affectedTests) {
                body += `- [ ] \`tests/${test}\`\n`;
              }
            } else {
              body += '- [ ] No existing test suite covers these files — consider creating one\n';
            }

            body += '\n## Suggested Actions\n';
            body += '- Review the commit diff and determine if new test cases are needed\n';
            body += '- Update existing test files if assertions need to change\n';
            body += '- Add new test cases for any new routes, links, or functionality\n';
            body += '- Mark checkboxes above as you review each suite\n';

            body += '\n---\n*Auto-generated by test coverage tracker. Add `[test-update]` to commit messages for test-only changes to skip this.*';

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'test-coverage',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'test-coverage',
                color: '0e8a16',
                description: 'Tracks needed test coverage updates after merges',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧪 Test coverage review: ${commitMsg.substring(0, 60)}`,
              body,
              labels: ['test-coverage'],
            });

            console.log('Test coverage issue created');
