name: Copilot Auto-Fix

on:
  issues:
    types: [labeled]

jobs:
  copilot-fix:
    if: github.event.label.name == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Add acknowledgment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **Copilot is on it!** I\'ve been assigned to work on this issue. I\'ll open a PR shortly.\n\n_Triggered by the `copilot` label._'
            });
