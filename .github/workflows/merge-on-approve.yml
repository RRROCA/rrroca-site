name: Merge on approval

on:
  pull_request_review:
    types: [submitted]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Merge approved PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log(`PR #${pr.number} approved by ${context.payload.review.user.login}`);

            // Try direct merge first (if CI already passed)
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('Merged successfully!');
            } catch (err) {
              // CI still running — enable auto-merge so it merges when CI passes
              console.log(`Direct merge not ready: ${err.message}`);
              console.log('Enabling auto-merge — will merge when CI passes...');
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }
              `, { pullRequestId: pr.node_id });
              console.log('Auto-merge enabled');
            }
