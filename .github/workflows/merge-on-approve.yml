name: Merge on approval

on:
  pull_request_review:
    types: [submitted]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge (waits for CI)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log(`PR #${pr.number} approved by ${context.payload.review.user.login}`);
            console.log('Enabling auto-merge — will merge when CI passes...');

            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }
              `, { pullRequestId: pr.node_id });
              console.log('Auto-merge enabled — PR will merge when all checks pass');
            } catch (err) {
              // Auto-merge requires branch protection — fall back to comment
              console.log(`Auto-merge failed: ${err.message}`);
              console.log('Branch protection may not be configured — see docs/TESTING.md');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '✅ Approved! Waiting for CI to pass before merging. If CI is already green, merge manually.',
              });
            }
