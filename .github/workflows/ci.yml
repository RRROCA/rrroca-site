name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            content:
              - 'content/**'
              - 'static/images/**'
            theme:
              - 'themes/**'
              - '!themes/rrroca/static/js/**'
              - 'hugo.toml'
              - 'static/css/**'
            js:
              - 'themes/rrroca/static/js/**'
            site:
              - 'content/**'
              - 'static/**'
              - 'themes/**'
              - 'hugo.toml'
              - 'api/**'
              - 'scripts/**'
              - 'tests/**'
              - 'e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'staticwebapp.config.json'
              - 'playwright.config.js'
              - 'jest.config.js'

      - name: Docs-only shortcut
        if: steps.changes.outputs.site == 'false' && github.event_name == 'pull_request'
        run: echo "✅ Docs-only change — skipping build and tests"

      - name: Setup Hugo Extended
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Setup Node.js
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        run: npm ci

      - name: Build site
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        run: hugo --gc --minify --buildFuture --baseURL "https://rrroca.github.io/rrroca-site/"

      - name: Run Jest unit tests
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        run: npx jest --verbose --coverage

      - name: Validate HTML (htmltest)
        if: steps.changes.outputs.site == 'true' || github.event_name != 'pull_request'
        run: |
          curl -sSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar -xz
          ./htmltest

      - name: Install Playwright browsers
        if: (steps.changes.outputs.content == 'true' || steps.changes.outputs.theme == 'true' || steps.changes.outputs.js == 'true' || github.event_name == 'push') && steps.changes.outputs.site == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e smoke tests
        if: (steps.changes.outputs.content == 'true' || steps.changes.outputs.theme == 'true' || steps.changes.outputs.js == 'true' || github.event_name == 'push') && steps.changes.outputs.site == 'true'
        run: npx playwright test --project=chromium

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  # GitHub Pages deployment removed — SWA is the sole deployment target
