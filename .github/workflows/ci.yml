name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: hugo --gc --minify

      - name: Run validation tests
        run: npx jest tests/build-validation.test.js

      - name: Install htmltest
        run: |
          HT_VERSION=0.17.0
          curl -sSL "https://github.com/wjdp/htmltest/releases/download/v${HT_VERSION}/htmltest_${HT_VERSION}_linux_amd64.tar.gz" -o htmltest.tar.gz
          tar -xzf htmltest.tar.gz htmltest
          sudo mv htmltest /usr/local/bin/htmltest

      - name: Validate generated HTML
        run: htmltest --path public --skip-external
