name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            content:
              - 'content/**'
              - 'static/images/**'
            theme:
              - 'themes/**'
              - '!themes/rrroca/static/js/**'
              - 'hugo.toml'
              - 'static/css/**'
            js:
              - 'themes/rrroca/static/js/**'
            docs:
              - 'docs/**'
              - '.github/**'
              - 'README.md'
              - '*.md'

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: hugo --gc --minify --buildFuture --baseURL "https://rrroca.github.io/rrroca-site/"

      - name: Run Jest unit tests
        run: npx jest --verbose --coverage

      - name: Validate HTML (htmltest)
        run: |
          curl -sSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar -xz
          ./htmltest

      - name: Install Playwright browsers
        if: steps.changes.outputs.content == 'true' || steps.changes.outputs.theme == 'true' || steps.changes.outputs.js == 'true' || github.event_name == 'push'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e smoke tests
        if: steps.changes.outputs.content == 'true' || steps.changes.outputs.theme == 'true' || steps.changes.outputs.js == 'true' || github.event_name == 'push'
        run: npx playwright test --project=chromium

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  # GitHub Pages deployment removed — SWA is the sole deployment target
