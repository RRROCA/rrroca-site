name: Assign content fixes to Copilot

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'content-fix')

    steps:
      - name: Auto-assign to Copilot
        uses: actions/github-script@v7
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        with:
          script: |
            const trustedAuthors = ['CanChad', 'SeunOgunsola'];
            const author = context.payload.issue.user.login;

            if (!trustedAuthors.includes(author)) {
              console.log(`Author ${author} not in trusted list — skipping auto-assign`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['needs-review'],
              });
              return;
            }

            console.log(`Trusted author ${author} — assigning to Copilot agent`);

            // Use the COPILOT_PAT (user token) to assign the Copilot coding agent
            // GITHUB_TOKEN cannot trigger the agent — a user PAT is required
            const pat = process.env.COPILOT_PAT;
            if (!pat) {
              core.setFailed('COPILOT_PAT secret is not set — cannot assign Copilot agent');
              return;
            }

            const response = await fetch(
              `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/issues/${context.payload.issue.number}/assignees`,
              {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${pat}`,
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({
                  assignees: ['copilot-swe-agent[bot]'],
                  agent_assignment: {
                    target_repo: `${context.repo.owner}/${context.repo.repo}`,
                    base_branch: 'master',
                    custom_instructions: '',
                    custom_agent: '',
                    model: '',
                  },
                }),
              }
            );

            if (!response.ok) {
              const body = await response.text();
              core.setFailed(`Failed to assign Copilot agent (${response.status}): ${body}`);
            } else {
              console.log('Copilot coding agent assigned successfully');
            }
