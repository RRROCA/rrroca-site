name: Assign content fixes to Copilot

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'content-fix')

    steps:
      - name: Auto-assign to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const trustedAuthors = ['CanChad', 'SeunOgunsola'];
            const author = context.payload.issue.user.login;

            // Auto-assign for trusted authors (board members)
            if (trustedAuthors.includes(author)) {
              console.log(`Trusted author ${author} — assigning to Copilot`);
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                assignees: ['copilot'],
              });
            } else {
              console.log(`Author ${author} not in trusted list — skipping auto-assign`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['needs-review'],
              });
            }
