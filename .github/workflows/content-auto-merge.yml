name: Auto-merge content fixes

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-content:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'copilot[bot]'
      || github.event.pull_request.user.login == 'CanChad'
      || github.event.pull_request.user.login == 'SeunOgunsola'

    steps:
      - name: Check files are content-only
        id: check-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const contentOnly = files.every(f =>
              f.filename.startsWith('content/') ||
              f.filename.startsWith('static/images/')
            );

            console.log(`Files changed: ${files.map(f => f.filename).join(', ')}`);
            console.log(`Content-only: ${contentOnly}`);
            core.setOutput('content-only', contentOnly.toString());

      - name: Mark ready if draft
        if: steps.check-files.outputs.content-only == 'true' && github.event.pull_request.draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

      - name: Enable auto-merge
        if: steps.check-files.outputs.content-only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto
