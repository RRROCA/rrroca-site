name: Auto-merge content fixes

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
    branches: [master]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Auto-merge content-only PRs from trusted authors (no review needed)
  auto-merge-content:
    if: >-
      github.event_name == 'pull_request' && (
        github.event.pull_request.user.login == 'copilot[bot]'
        || github.event.pull_request.user.login == 'CanChad'
        || github.event.pull_request.user.login == 'SeunOgunsola'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check files are content-only
        id: check-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const contentOnly = files.every(f =>
              f.filename.startsWith('content/') ||
              f.filename.startsWith('static/images/')
            );

            console.log(`Files changed: ${files.map(f => f.filename).join(', ')}`);
            console.log(`Content-only: ${contentOnly}`);

            // Check for design patterns in content file diffs (HTML tags, CSS classes, inline styles)
            let hasDesignPatterns = false;
            if (contentOnly) {
              const designPatternRegex = /<\s*(p|a|div|span|button|section|article|nav|header|footer|table|form|iframe|script|style)\b|class\s*=\s*"|style\s*=\s*"|<\/\s*(p|a|div|span|button|section|article|nav|header|footer|table|form|iframe|script|style)\s*>/i;
              
              for (const file of files) {
                if (!file.filename.startsWith('content/') || !file.patch) continue;
                // Only check added lines (lines starting with +)
                const addedLines = file.patch.split('\n')
                  .filter(line => line.startsWith('+') && !line.startsWith('+++'))
                  .join('\n');
                if (designPatternRegex.test(addedLines)) {
                  hasDesignPatterns = true;
                  console.log(`⚠️ Design pattern detected in ${file.filename}`);
                  break;
                }
              }
            }

            if (hasDesignPatterns) {
              console.log('❌ Content files contain HTML/design patterns — requires human review');
              core.setOutput('content-only', 'false');
              core.setOutput('design-violation', 'true');
            } else {
              core.setOutput('content-only', contentOnly.toString());
              core.setOutput('design-violation', 'false');
            }

      - name: Comment on design violation
        if: steps.check-files.outputs.design-violation == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ **Auto-merge blocked**: This PR adds raw HTML or design patterns to content files. Content-only PRs must use pure markdown (no \`<a>\`, \`<p>\`, \`class=\`, etc.). A human reviewer needs to approve this change."

      - name: Add design-change label
        if: steps.check-files.outputs.design-violation == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label "design-change" || true

      - name: Mark ready if draft
        if: steps.check-files.outputs.content-only == 'true' && github.event.pull_request.draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

      - name: Enable auto-merge
        if: steps.check-files.outputs.content-only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto

      - name: Disable auto-merge if no longer content-only
        if: steps.check-files.outputs.content-only != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --disable-auto || true

  # Auto-merge any PR once approved (waits for CI)
  merge-on-approve:
    if: >-
      github.event_name == 'pull_request_review'
      && github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge after approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log(`PR #${pr.number} approved by ${context.payload.review.user.login}`);

            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }
              `, { pullRequestId: pr.node_id });
              console.log('Auto-merge enabled — PR will merge when all checks pass');
            } catch (err) {
              console.log(`Auto-merge failed: ${err.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '✅ Approved! Merge manually once CI passes.',
              });
            }
