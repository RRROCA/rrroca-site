name: "Bug Report"
description: "Report a problem with the RRROCA website"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: "What page were you on?"
      placeholder: "e.g., /events/ or /about/board-of-directors/"
    validations:
      required: true

  - type: dropdown
    id: browser-device
    attributes:
      label: "What browser/device?"
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile Safari
        - Mobile Chrome
        - Other

  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshot"
      description: "Drag and drop an image here"
