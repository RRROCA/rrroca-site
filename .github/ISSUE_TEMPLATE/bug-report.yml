name: "🐛 Bug Report"
description: "Report a problem with the RRROCA website — broken links, display issues, errors, or anything that doesn't work right."
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Report a Website Bug
        Found something broken? Tell us what happened and we'll fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: "What went wrong?"
      description: "Describe the problem. What did you see? What did you expect to see instead?"
      placeholder: |
        Example: "The 'Join RRROCA' button on the homepage goes to a 404 page instead of the membership signup."
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: "Which page?"
      description: "Paste the URL or describe which page the bug is on."
      placeholder: "https://canchad.github.io/rrroca-site/about/"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "How bad is it?"
      options:
        - "🔴 Page is broken / can't use it at all"
        - "🟡 Something looks wrong but still works"
        - "🟢 Minor cosmetic issue"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: "What device were you using?"
      options:
        - "📱 Phone"
        - "💻 Laptop / Desktop"
        - "📋 Tablet"
        - "Not sure"

  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshot (optional)"
      description: "Drag and drop a screenshot here if it helps explain the problem."
      placeholder: "Paste or drag a screenshot here"

  - type: markdown
    attributes:
      value: |
        ---
        Thanks for reporting! Chad will triage this and get it fixed. 🛠️
