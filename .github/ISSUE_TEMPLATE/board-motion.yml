name: "Board Motion"
description: "Propose a motion for board vote"
labels: ["motion", "governance"]
body:
  - type: input
    id: motion-title
    attributes:
      label: "Motion title"
      placeholder: "e.g., Motion 2026-003: Approve Park Upgrades"
    validations:
      required: true

  - type: input
    id: proposed-by
    attributes:
      label: "Proposed by"
    validations:
      required: true

  - type: textarea
    id: motion-text
    attributes:
      label: "What are you proposing?"
      description: "Describe the motion clearly. Start with 'BE IT RESOLVED THAT...' if appropriate."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Why is this needed?"
      description: "Explain the background, problem, or rationale for this motion."
    validations:
      required: true

  - type: dropdown
    id: decision-type
    attributes:
      label: "What type of decision is this?"
      options:
        - Budget
        - Policy
        - Operations
        - Partnership
        - Other
    validations:
      required: true

  - type: input
    id: amount
    attributes:
      label: "How much money?"
      placeholder: "$0 if none"
    validations:
      required: true

  - type: input
    id: portfolio
    attributes:
      label: "Which portfolio does this fall under?"
      placeholder: "e.g., Parks, Safety, Events, Communications"
    validations:
      required: true

  - type: input
    id: decision-by
    attributes:
      label: "When do you need a decision by?"
      description: "Use YYYY-MM-DD format."
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  - type: textarea
    id: supporting-docs
    attributes:
      label: "Any supporting documents or links?"
      description: "Optional: include links, references, or supporting details."
      placeholder: "Add URLs, document references, or extra context"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## How to Vote
        
        Board members: React to this issue with:
        - 👍 = Vote FOR
        - 👎 = Vote AGAINST
        - 👀 = ABSTAIN
        
        Discuss in comments before voting. President will close the issue with the result.
