<header class="site-header">
  <div class="container header-inner">
    <a href="{{ "/" | absURL }}" class="logo">
      <img src="{{ "/images/rrroca-logo.png" | absURL }}" alt="RRROCA" class="logo-img" width="40" height="40">
      <div class="logo-text">
        <strong>RRROCA</strong>
        <small>Rocky Ridge Royal Oak Community Association</small>
      </div>
    </a>
    <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-main').classList.toggle('open')">☰</button>
    <nav class="nav-main">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | absURL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <button class="search-trigger" onclick="openSearch()" aria-label="Search">🔍 Search <kbd>Ctrl+K</kbd></button>
      <a href="{{ .Site.Params.membershipURL | absURL }}" class="btn btn-primary btn-sm">Join / Renew</a>
    </nav>
  </div>
</header>
