<!-- Facebook Page Plugin embed -->
<div class="fb-widget">
  <h3>📘 Latest from RRROCA on Facebook</h3>
  <div class="fb-page"
    data-href="{{ .Site.Params.facebookPage }}"
    data-tabs="timeline"
    data-width="500"
    data-height="400"
    data-small-header="true"
    data-adapt-container-width="true"
    data-hide-cover="false"
    data-show-facepile="true">
    <blockquote cite="{{ .Site.Params.facebookPage }}" class="fb-xfbml-parse-ignore">
      <a href="{{ .Site.Params.facebookPage }}">RRROCA on Facebook</a>
    </blockquote>
  </div>
</div>
