<section class="footer-newsletter" aria-labelledby="footer-newsletter-title">
  <div class="footer-newsletter-copy">
    <span class="section-label">Newsletter</span>
    <p id="footer-newsletter-title" class="footer-newsletter-title">Get RRROCA updates by email</p>
    <p>Subscribe for community news, safety alerts, and event reminders.</p>
  </div>
  <form
    class="footer-newsletter-form"
    action="https://buttondown.email/api/emails/embed-subscribe/rrroca"
    method="post"
    target="popupwindow"
    data-popup-url="https://buttondown.email/rrroca"
  >
    <label class="sr-only" for="footer-newsletter-email">Email address</label>
    <input id="footer-newsletter-email" type="email" name="email" placeholder="Your email address" autocomplete="email" required>
    <button type="submit" class="btn stripe-btn">Subscribe</button>
  </form>
</section>
