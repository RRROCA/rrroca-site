{{- $level := .Level -}}
{{- if eq $level 1 -}}
  {{- $level = 2 -}}
{{- else if gt $level 3 -}}
  {{- $level = 3 -}}
{{- end -}}
<h{{ $level }}{{ with .Anchor }} id="{{ . }}"{{ end }}{{ range $key, $value := .Attributes }}{{ if ne $key "id" }} {{ printf "%s=%q" $key $value | safeHTMLAttr }}{{ end }}{{ end }}>{{ .Text }}</h{{ $level }}>
