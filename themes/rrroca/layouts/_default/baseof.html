<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en-US" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link rel="preload" href="{{ "fonts/inter-400.woff2" | absURL }}" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="{{ "fonts/merriweather-700.woff2" | absURL }}" as="font" type="font/woff2" crossorigin="anonymous">
  {{ $css := resources.Get "css/style.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" crossorigin="anonymous">
  <meta name="base-url" content="{{ "" | absURL }}">
  <script src="{{ "js/base-config.js" | absURL }}" defer></script>
  <script src="{{ "js/newsletter.js" | absURL }}" defer></script>
  {{ hugo.Generator }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ partial "facebook-sdk.html" . }}
</body>
</html>
