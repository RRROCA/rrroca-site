<div class="contact-methods">
  <div class="contact-method-card">
    <h3>Email</h3>
    <p>For general questions, reach us at <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>.</p>
  </div>
  <div class="contact-method-card">
    <h3>Safety matters</h3>
    <p>For urgent issues, call <a href="tel:911">911</a>. For non-emergencies, call <a href="tel:{{ replace .Site.Params.cpsNonEmergency "-" "" }}">{{ .Site.Params.cpsNonEmergency }}</a>.</p>
  </div>
  <div class="contact-method-card">
    <h3>Ways to help</h3>
    <p>Interested in volunteering or sponsorship? Use the form or visit <a href="{{ "/get-involved/" | relURL }}">Get Involved</a>.</p>
  </div>
</div>
